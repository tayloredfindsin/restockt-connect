<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Restockt - Connect Shopify</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;background:#f8f9fa;color:#1a1a1a;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 32px;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center}
.logo{font-size:48px;margin-bottom:12px}
h1{font-size:24px;font-weight:700;margin-bottom:6px}
.subtitle{font-size:14px;color:#666;margin-bottom:28px;line-height:1.5}
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:5px}
.field input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;outline:none}
.field input:focus{border-color:#4F46E5}
.btn{display:inline-block;width:100%;padding:14px 24px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.btn-primary{background:#4F46E5;color:#fff}
.btn-primary:hover{background:#4338CA}
.btn-primary:disabled{background:#a5a3d9;cursor:not-allowed}
.btn-shopify{background:#95BF47;color:#fff;margin-top:12px}
.btn-shopify:hover{background:#7ea83d}
.btn-shopify:disabled{background:#c5d9a0;cursor:not-allowed}
.sb{padding:16px;border-radius:12px;margin-bottom:16px;font-size:14px;line-height:1.5}
.sc{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.sw{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.se{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.sf{margin-top:16px}
.sf input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;outline:none}
.sf input:focus{border-color:#95BF47}
.hint{font-size:12px;color:#888;margin-top:6px;text-align:left}
.ui{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f3f4f6;border-radius:10px;margin-bottom:20px;font-size:13px}
.ui .em{font-weight:600;color:#333}
.ui .lo{color:#4F46E5;cursor:pointer;font-weight:600;border:none;background:none;font-size:13px}
.hidden{display:none}
.spin{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
<div class="logo">&#x1F4E6;</div>
<h1>Restockt</h1>
<p class="subtitle">Connect your Shopify store to sync products and orders with Restockt.</p>
<div id="L">
<div style="margin-bottom:24px">
<div class="field"><label for="email">Email</label><input type="email" id="email" placeholder="you@example.com"></div>
<div class="field"><label for="password">Password</label><input type="password" id="password" placeholder="Your Restockt password"></div>
</div>
<button class="btn btn-primary" id="lb" onclick="doLogin()">Sign In</button>
<div id="le" class="sb se hidden" style="margin-top:16px"></div>
</div>
<div id="C" class="hidden">
<div class="ui"><span class="em" id="ue"></span><button class="lo" onclick="doLogout()">Sign Out</button></div>
<div id="sa"></div>
<div id="cf">
<div class="sf"><input type="text" id="sn" placeholder="your-store-name" value="r06fs1-wy"><p class="hint">Your Shopify store name (before .myshopify.com)</p></div>
<button class="btn btn-shopify" id="cb" onclick="doConnect()">&#x1F6CD;&#xFE0F; Connect Shopify</button>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var U="https://tjihedvhcsayulfwfpov.supabase.co",K="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqaWhlZHZoY3NheXVsZndmcG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDI4NDYsImV4cCI6MjA5MDAxODg0Nn0.9L4baXAf7rWjKqJFq8q18iyVNd16TXgNRsqrGIhFAUE";
var sb=supabase.createClient(U,K),me=null,tok=null;
async function init(){var s=await sb.auth.getSession();if(s.data.session){me=s.data.session.user;tok=s.data.session.access_token;showC()}}
async function doLogin(){var e=document.getElementById("email").value.trim(),p=document.getElementById("password").value,b=document.getElementById("lb"),x=document.getElementById("le");if(!e||!p){x.textContent="Enter email and password.";x.classList.remove("hidden");return}b.disabled=true;b.innerHTML="Signing in...";x.classList.add("hidden");var r=await sb.auth.signInWithPassword({email:e,password:p});if(r.error){x.textContent=r.error.message;x.classList.remove("hidden");b.disabled=false;b.textContent="Sign In";return}me=r.data.user;tok=r.data.session.access_token;showC()}
async function showC(){document.getElementById("L").classList.add("hidden");document.getElementById("C").classList.remove("hidden");document.getElementById("ue").textContent=me.email;await chk()}
async function chk(){var a=document.getElementById("sa");try{var r=await fetch(U+"/functions/v1/shopify-oauth?action=status",{headers:{Authorization:"Bearer "+tok}});var d=await r.json();if(d.connected){a.innerHTML='<div class="sb sc"><strong>Shopify Connected</strong><br>Store: '+(d.shopHandle||"Connected")+"</div>";document.getElementById("cf").innerHTML='<p style="font-size:14px;color:#666;margin:16px 0">Store linked! Open Restockt app to sync.</p><button class="btn btn-shopify" onclick="showR()">Reconnect Different Store</button>'}else{a.innerHTML='<div class="sb sw">Shopify not connected. Enter store name below.</div>'}}catch(e){a.innerHTML='<div class="sb se">Could not check status.</div>'}}
function showR(){document.getElementById("cf").innerHTML='<div class="sf"><input type="text" id="sn" placeholder="your-store-name"><p class="hint">Store name (before .myshopify.com)</p></div><button class="btn btn-shopify" id="cb" onclick="doConnect()">Connect Shopify</button>'}
function doConnect(){var s=document.getElementById("sn").value.trim().replace(".myshopify.com","");if(!s){alert("Enter store name.");return}var b=document.getElementById("cb");if(b){b.disabled=true;b.innerHTML="Redirecting..."}window.location.href=U+"/functions/v1/shopify-oauth?action=auth&shop="+encodeURIComponent(s)+"&user_id="+me.id}
function doLogout(){sb.auth.signOut();me=null;tok=null;document.getElementById("L").classList.remove("hidden");document.getElementById("C").classList.add("hidden")}
document.addEventListener("keydown",function(e){if(e.key==="Enter"&&!document.getElementById("L").classList.contains("hidden"))doLogin()});
init();
</script>
</body>
</html>
